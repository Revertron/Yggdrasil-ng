name: Build .deb package

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  build-deb:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: amd64
          - target: armv7-unknown-linux-musleabihf
            arch: armhf
          - target: aarch64-unknown-linux-musl
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross and cargo-deb
        run: |
          cargo install cross cargo-deb

      - name: Build with cross
        run: cross build --release --target ${{ matrix.target }} -p yggdrasil

      - name: Package .deb
        run: cargo deb -p yggdrasil --target ${{ matrix.target }} --no-build

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: yggdrasil-deb-${{ matrix.arch }}
          path: target/${{ matrix.target }}/debian/*.deb

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/debian/*.deb